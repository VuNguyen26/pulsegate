services:
  postgres:
    image: postgres:16-alpine
    container_name: pulsegate-postgres
    environment:
      POSTGRES_USER: pulsegate
      POSTGRES_PASSWORD: pulsegate_password
      POSTGRES_DB: pulsegate
    ports:
      - "5432:5432"
    volumes:
      - pulsegate_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pulsegate -d pulsegate"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: pulsegate-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  product-service:
    build:
      context: .
      dockerfile: apps/product-service/Dockerfile
    container_name: pulsegate-product-service
    environment:
      NODE_ENV: development
      PORT: 3001
      HOST: 0.0.0.0
      DATABASE_URL: "postgresql://pulsegate:pulsegate_password@postgres:5432/pulsegate"
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001/health').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api-gateway:
    build:
      context: .
      dockerfile: apps/api-gateway/Dockerfile
    container_name: pulsegate-api-gateway
    environment:
      NODE_ENV: development
      PORT: 3000
      HOST: 0.0.0.0
      PRODUCT_SERVICE_URL: "http://product-service:3001"
      DATABASE_URL: "postgresql://pulsegate:pulsegate_password@postgres:5432/pulsegate?schema=gateway"
      REDIS_URL: "redis://redis:6379"
      DOWNSTREAM_REQUEST_TIMEOUT_MS: 3000
      MAX_REQUEST_BODY_BYTES: 1048576
      API_KEY_HEADER: x-api-key
      API_KEYS: dev-api-key
      ADMIN_API_KEY_HEADER: "${ADMIN_API_KEY_HEADER:-x-admin-api-key}"
      ADMIN_API_KEY: "${ADMIN_API_KEY:-local-admin-key}"
      ADMIN_READ_ONLY_API_KEY: "${ADMIN_READ_ONLY_API_KEY:-}"
      JWT_SECRET: local-dev-jwt-secret-change-me
      JWT_ISSUER: pulsegate-api-gateway
      JWT_AUDIENCE: pulsegate-clients
      JWT_EXPIRES_IN_SECONDS: 900
      PRODUCT_PRODUCTS_RATE_LIMIT_MAX_REQUESTS: 5
      PRODUCT_PRODUCTS_RATE_LIMIT_WINDOW_MS: 60000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      product-service:
        condition: service_healthy

  admin-dashboard:
    build:
      context: .
      dockerfile: apps/admin-dashboard/Dockerfile
    container_name: pulsegate-admin-dashboard
    environment:
      NODE_ENV: production
      PULSEGATE_GATEWAY_BASE_URL: "http://api-gateway:3000"
      ADMIN_API_KEY_HEADER: "${ADMIN_API_KEY_HEADER:-x-admin-api-key}"
      ADMIN_READ_ONLY_API_KEY: "${ADMIN_READ_ONLY_API_KEY:-}"
      ADMIN_DASHBOARD_REQUEST_TIMEOUT_MS: "${ADMIN_DASHBOARD_REQUEST_TIMEOUT_MS:-3000}"
    ports:
      - "3003:3003"
    depends_on:
      - api-gateway
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3003/').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
  developer-portal:
    build:
      context: .
      dockerfile: apps/developer-portal/Dockerfile
    container_name: pulsegate-developer-portal
    environment:
      NODE_ENV: production
    ports:
      - "3004:3004"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3004/').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
  prometheus:
    image: prom/prometheus:latest
    container_name: pulsegate-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - pulsegate_prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    depends_on:
      - api-gateway

  loki:
    image: grafana/loki:3.7.3
    container_name: pulsegate-loki
    command:
      - "-config.file=/etc/loki/config.yml"
    volumes:
      - ./observability/loki/loki-config.yml:/etc/loki/config.yml:ro
      - pulsegate_loki_data:/loki

  alloy:
    image: grafana/alloy:v1.17.1
    container_name: pulsegate-alloy
    command:
      - run
      - "--server.http.listen-addr=0.0.0.0:12345"
      - "--storage.path=/var/lib/alloy/data"
      - /etc/alloy/config.alloy
    volumes:
      - ./observability/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - pulsegate_alloy_data:/var/lib/alloy/data
    depends_on:
      - loki
  grafana:
    image: grafana/grafana:latest
    container_name: pulsegate-grafana
    ports:
      - "3002:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - pulsegate_grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

  k6:
    image: grafana/k6:latest
    profiles:
      - tools
    environment:
      BASE_URL: "${K6_BASE_URL:-http://api-gateway:3000}"
    volumes:
      - ./observability/k6:/scripts:ro
    depends_on:
      - api-gateway
    command:
      - run
      - /scripts/api-gateway-smoke.js

volumes:
  pulsegate_postgres_data:
  pulsegate_prometheus_data:
  pulsegate_grafana_data:
  pulsegate_loki_data:
  pulsegate_alloy_data:
