apiVersion: v1
kind: ConfigMap
metadata:
  name: admin-dashboard-config
  labels:
    app.kubernetes.io/name: admin-dashboard
    app.kubernetes.io/part-of: pulsegate
    app.kubernetes.io/component: admin
data:
  NODE_ENV: production
  PULSEGATE_GATEWAY_BASE_URL: http://api-gateway:3000
  ADMIN_API_KEY_HEADER: x-admin-api-key
  ADMIN_DASHBOARD_REQUEST_TIMEOUT_MS: "3000"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-dashboard
  labels:
    app.kubernetes.io/name: admin-dashboard
    app.kubernetes.io/part-of: pulsegate
    app.kubernetes.io/component: admin
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: admin-dashboard
      app.kubernetes.io/part-of: pulsegate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: admin-dashboard
        app.kubernetes.io/part-of: pulsegate
        app.kubernetes.io/component: admin
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: admin-dashboard
          image: pulsegate-admin-dashboard:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3003
              protocol: TCP
          envFrom:
            - configMapRef:
                name: admin-dashboard-config
          env:
            - name: ADMIN_READ_ONLY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: admin-dashboard-secrets
                  key: ADMIN_READ_ONLY_API_KEY
          startupProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
---
apiVersion: v1
kind: Service
metadata:
  name: admin-dashboard
  labels:
    app.kubernetes.io/name: admin-dashboard
    app.kubernetes.io/part-of: pulsegate
    app.kubernetes.io/component: admin
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: admin-dashboard
    app.kubernetes.io/part-of: pulsegate
  ports:
    - name: http
      port: 3003
      targetPort: http
      protocol: TCP