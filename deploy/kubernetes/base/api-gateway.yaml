apiVersion: v1
kind: ConfigMap
metadata:
  name: api-gateway-config
  labels:
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/part-of: pulsegate
    app.kubernetes.io/component: gateway
data:
  NODE_ENV: production
  PORT: "3000"
  HOST: 0.0.0.0
  PRODUCT_SERVICE_URL: http://product-service:3001
  REDIS_URL: redis://redis:6379
  DOWNSTREAM_REQUEST_TIMEOUT_MS: "3000"
  MAX_REQUEST_BODY_BYTES: "1048576"
  API_KEY_HEADER: x-api-key
  ADMIN_API_KEY_HEADER: x-admin-api-key
  JWT_ISSUER: pulsegate-api-gateway
  JWT_AUDIENCE: pulsegate-clients
  JWT_EXPIRES_IN_SECONDS: "900"
  PRODUCT_PRODUCTS_RATE_LIMIT_MAX_REQUESTS: "5"
  PRODUCT_PRODUCTS_RATE_LIMIT_WINDOW_MS: "60000"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  labels:
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/part-of: pulsegate
    app.kubernetes.io/component: gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: api-gateway
      app.kubernetes.io/part-of: pulsegate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: api-gateway
        app.kubernetes.io/part-of: pulsegate
        app.kubernetes.io/component: gateway
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api-gateway
          image: pulsegate-api-gateway:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: api-gateway-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: api-gateway-secrets
                  key: DATABASE_URL
            - name: API_KEYS
              valueFrom:
                secretKeyRef:
                  name: api-gateway-secrets
                  key: API_KEYS
            - name: ADMIN_API_KEY
              valueFrom:
                secretKeyRef:
                  name: api-gateway-secrets
                  key: ADMIN_API_KEY
            - name: ADMIN_READ_ONLY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: api-gateway-secrets
                  key: ADMIN_READ_ONLY_API_KEY
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: api-gateway-secrets
                  key: JWT_SECRET
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  labels:
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/part-of: pulsegate
    app.kubernetes.io/component: gateway
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/part-of: pulsegate
  ports:
    - name: http
      port: 3000
      targetPort: http
      protocol: TCP