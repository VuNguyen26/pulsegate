apiVersion: v1
kind: ConfigMap
metadata:
  name: product-service-config
  labels:
    app.kubernetes.io/name: product-service
    app.kubernetes.io/part-of: pulsegate
    app.kubernetes.io/component: downstream
data:
  NODE_ENV: production
  PORT: "3001"
  HOST: 0.0.0.0
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service
  labels:
    app.kubernetes.io/name: product-service
    app.kubernetes.io/part-of: pulsegate
    app.kubernetes.io/component: downstream
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: product-service
      app.kubernetes.io/part-of: pulsegate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: product-service
        app.kubernetes.io/part-of: pulsegate
        app.kubernetes.io/component: downstream
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: product-service
          image: pulsegate-product-service:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3001
              protocol: TCP
          envFrom:
            - configMapRef:
                name: product-service-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: product-service-secrets
                  key: DATABASE_URL
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
---
apiVersion: v1
kind: Service
metadata:
  name: product-service
  labels:
    app.kubernetes.io/name: product-service
    app.kubernetes.io/part-of: pulsegate
    app.kubernetes.io/component: downstream
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: product-service
    app.kubernetes.io/part-of: pulsegate
  ports:
    - name: http
      port: 3001
      targetPort: http
      protocol: TCP