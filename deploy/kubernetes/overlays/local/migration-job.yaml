apiVersion: batch/v1
kind: Job
metadata:
  name: pulsegate-migrations
  labels:
    app.kubernetes.io/name: pulsegate-migrations
    app.kubernetes.io/part-of: pulsegate
    app.kubernetes.io/component: migration
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pulsegate-migrations
        app.kubernetes.io/part-of: pulsegate
        app.kubernetes.io/component: migration
    spec:
      automountServiceAccountToken: false
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: product-service-migration
          image: pulsegate-product-service:local
          imagePullPolicy: IfNotPresent
          workingDir: /app/apps/product-service
          command:
            - npm
            - run
            - db:migrate:deploy
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: product-service-secrets
                  key: DATABASE_URL
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
        - name: api-gateway-migration
          image: pulsegate-api-gateway:local
          imagePullPolicy: IfNotPresent
          workingDir: /app/apps/api-gateway
          command:
            - npm
            - run
            - db:migrate:deploy
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: api-gateway-secrets
                  key: DATABASE_URL
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      containers:
        - name: completion
          image: pulsegate-api-gateway:local
          imagePullPolicy: IfNotPresent
          command:
            - node
            - -e
            - console.log("PulseGate migrations completed")
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL