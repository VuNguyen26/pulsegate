apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: pulsegate

resources:
  - namespace.yaml
  - postgres.yaml
  - redis.yaml
  - migration-job.yaml

generatorOptions:
  disableNameSuffixHash: true
  labels:
    app.kubernetes.io/part-of: pulsegate
    app.kubernetes.io/managed-by: kustomize

secretGenerator:
  - name: postgres-secrets
    literals:
      - POSTGRES_PASSWORD=local-development-only
  - name: product-service-secrets
    literals:
      - DATABASE_URL=postgresql://pulsegate:local-development-only@postgres:5432/pulsegate
  - name: api-gateway-secrets
    literals:
      - DATABASE_URL=postgresql://pulsegate:local-development-only@postgres:5432/pulsegate?schema=gateway
      - API_KEYS=local-development-api-key
      - ADMIN_API_KEY=local-development-admin-key
      - ADMIN_READ_ONLY_API_KEY=local-development-read-only-admin-key
      - JWT_SECRET=local-development-jwt-secret-change-me
  - name: admin-dashboard-secrets
    literals:
      - ADMIN_READ_ONLY_API_KEY=local-development-read-only-admin-key